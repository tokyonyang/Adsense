name: Morning Headline News Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:10
    - cron: "10 21 * * *"

jobs:
  morning-headline-news:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Daily Hot Issue와 동일한 기준
      LOOKBACK_HOURS: 24
      FALLBACK_LOOKBACK_HOURS: 48
      MAX_KEYWORDS: 30
      HOT_ISSUE_COUNT: 10
      HOT_ISSUE_CATEGORY_BALANCED: "true"
      HOT_ISSUE_PER_CATEGORY_MAX: 2
      HOT_ISSUE_OTHER_MAX: 1
      CARD_NEWS_COUNT: 3
      ARTICLE_COUNT: 3
      NEWS_LINKS_PER_TOPIC: 5
      CATEGORY_FILTER: all
      ITEM_LIST_ONLY: "true"
      AUTO_FALLBACK: "true"
      USE_NAVER_NEWS_CANDIDATES: "true"
      USE_NAVER_DATALAB: "true"
      NEWS_PROVIDER: naver_first

      # 카드뉴스 전송 설정
      HEADLINE_CARDNEWS_ISSUES: 5
      HEADLINE_IMAGE_SCALE: 2
      HEADLINE_SEND_LINK_DIGEST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install requests feedparser beautifulsoup4 python-dotenv google-generativeai playwright
          python -m playwright install --with-deps chromium

      - name: Send Daily Hot Issue based cardnews report
        run: |
          python -m app.jobs.send_headline_cardnews_report
