name: Morning Headline News Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:10
    # UTC 21:10(previous day)
    - cron: "10 21 * * *"

jobs:
  morning-headline-news:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Morning도 Daily와 동일한 카테고리 정책 사용
      HOT_ISSUE_CATEGORY_MODE: "finance_first"
      HOT_ISSUE_PRIORITY_CATEGORIES: "경제·금융,증권·투자,산업·기업,정책·지원금,부동산·주거금융,생활·제도,국제"
      HOT_ISSUE_PRIORITY_MIN: 6
      HOT_ISSUE_PRIORITY_MAX: 8
      HOT_ISSUE_SECONDARY_CATEGORIES: "시사·정치,사회·사건,날씨·안전,건강·의료,교육·입시"
      HOT_ISSUE_SECONDARY_MAX: 3
      HOT_ISSUE_LOW_PRIORITY_CATEGORIES: "연예·문화,스포츠,기타"
      HOT_ISSUE_LOW_PRIORITY_MAX: 2
      HOT_ISSUE_OTHER_MAX: 1
      HOT_ISSUE_PER_CATEGORY_MAX: 2
      HOT_ISSUE_PRIORITY_PER_CATEGORY_MAX: 3
      HOT_ISSUE_TOP_N: 10

      HEADLINE_LOOKBACK_HOURS: 48
      HEADLINE_CARDNEWS_ISSUES: 5
      HEADLINE_IMAGE_SCALE: 2
      HEADLINE_SEND_LINK_DIGEST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai playwright beautifulsoup4 lxml
          python -m playwright install --with-deps chromium

      - name: Send morning headline cardnews report
        run: |
          python -m app.jobs.send_headline_cardnews_report
