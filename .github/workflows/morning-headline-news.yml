name: Morning Headline News Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:10
    - cron: "10 21 * * *"

jobs:
  morning-headline-news:
    runs-on: ubuntu-latest

    env:

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: "gemini-2.0-flash"

      HOT_ISSUE_EDITORIAL_MODE: "slot_editorial"
      HOT_ISSUE_SLOT_PLAN: "경제·금융:2,증권·투자:2,산업·기업:2,정책·생활:1,국제·안전:1,사회·시사:1,대중관심:1"
      HOT_ISSUE_NOISE_MAX: 1
      HOT_ISSUE_DEDUPE_THRESHOLD: "0.34"
      HOT_ISSUE_TOP_N: 10
      HOT_ISSUE_TREND_LIMIT: 35
      HOT_ISSUE_NEWS_PER_KEYWORD: 5
      HOT_ISSUE_LOOKBACK_HOURS: 48
      HOT_ISSUE_REQUEST_SLEEP: "0.12"
      HOT_ISSUE_USE_REFERENCE_HEADLINES: "true"
      HOT_ISSUE_REFERENCE_PACKS: "economic_newspaper,stock_finance,international,politics_social,it_science_life"
      HOT_ISSUE_REFERENCE_HEADLINES_FILE: "data/morning_reference_headlines.txt"
      HEADLINE_CARDNEWS_ISSUES: 5
      HEADLINE_CARDNEWS_MIN_EDITORIAL_SCORE: 40
      HEADLINE_AVOID_SLOTS: "대중관심"
      HEADLINE_PREFER_SLOTS: "경제·금융,증권·투자,산업·기업,정책·생활,국제·안전,사회·시사"
      HEADLINE_IMAGE_WIDTH: 1080
      HEADLINE_IMAGE_HEIGHT: 1080
      HEADLINE_IMAGE_SCALE: 2
      HEADLINE_SEND_LINK_DIGEST: "true"
      HEADLINE_ENABLE_MARKET_CHARTS: "true"
      HEADLINE_CHART_RANGE: "3mo"
      HEADLINE_CHART_INTERVAL: "1d"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show trigger schedule
        run: |
          echo "Triggered by event: ${{ github.event_name }}"
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai playwright beautifulsoup4 lxml
          python -m playwright install --with-deps chromium
      - name: Send morning headline cardnews report
        run: python -m app.jobs.send_headline_cardnews_report
