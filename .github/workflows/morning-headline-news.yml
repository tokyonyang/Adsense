name: Morning Headline News Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:10
    # UTC 21:10(previous day)
    - cron: "10 21 * * *"

jobs:
  morning-headline-news:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # v1.24: 헤드라인 List 기준 카드뉴스
      HEADLINE_LOOKBACK_HOURS: 48
      HEADLINE_SIMILAR_LOOKBACK_HOURS: 72
      HEADLINE_CARDNEWS_ISSUES: 5
      HEADLINE_IMAGE_SCALE: 2
      HEADLINE_SEND_LINK_DIGEST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai playwright
          python -m playwright install --with-deps chromium

      - name: Send morning headline anchor cardnews report
        run: |
          python -m app.jobs.send_headline_cardnews_report
