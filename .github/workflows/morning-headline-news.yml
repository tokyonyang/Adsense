name: Morning Headline News Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:10
    # UTC 21:10(previous day)
    - cron: "10 21 * * *"

jobs:
  morning-headline-news:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HEADLINE_NEWS_COUNT: 10
      HEADLINE_LOOKBACK_HOURS: 24
      HEADLINE_FALLBACK_LOOKBACK_HOURS: 48
      HEADLINE_SEND_TEXT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser pillow python-dotenv google-generativeai

      - name: Send morning headline image report
        run: |
          python -m app.jobs.send_headline_news_report
