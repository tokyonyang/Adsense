name: AdSense Dashboard Pipeline Report

on:
  workflow_dispatch:
  schedule:
    # KST 09:17 / 17:17
    - cron: "17 0 * * *"
    - cron: "17 8 * * *"

jobs:
  adsense-dashboard-pipeline:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai beautifulsoup4 lxml
      - run: python -m app.jobs.send_telegram_test
      - run: python -m app.jobs.run_event_boost_preview
      - run: python -m app.jobs.run_daily_pipeline
