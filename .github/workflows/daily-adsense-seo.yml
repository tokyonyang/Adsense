name: Daily AdSense SEO Hot Issue Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:07 / 11:07 / 15:07 / 19:07
    - cron: "7 21 * * *"
    - cron: "7 2 * * *"
    - cron: "7 6 * * *"
    - cron: "7 10 * * *"

jobs:
  daily-adsense-seo:
    runs-on: ubuntu-latest

    env:

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: "gemini-2.0-flash"

      HOT_ISSUE_EDITORIAL_MODE: "slot_editorial"
      HOT_ISSUE_SLOT_PLAN: "경제·금융:2,증권·투자:2,산업·기업:2,정책·생활:1,국제·안전:1,사회·시사:1,대중관심:1"
      HOT_ISSUE_NOISE_MAX: 1
      HOT_ISSUE_DEDUPE_THRESHOLD: "0.34"
      HOT_ISSUE_TOP_N: 10
      HOT_ISSUE_TREND_LIMIT: 35
      HOT_ISSUE_NEWS_PER_KEYWORD: 5
      HOT_ISSUE_LOOKBACK_HOURS: 48
      HOT_ISSUE_REQUEST_SLEEP: "0.12"
      HOT_ISSUE_USE_REFERENCE_HEADLINES: "true"
      HOT_ISSUE_REFERENCE_PACKS: "economic_newspaper,stock_finance,international,politics_social,it_science_life"
      HOT_ISSUE_REFERENCE_HEADLINES_FILE: "data/morning_reference_headlines.txt"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show trigger schedule
        run: |
          echo "Triggered by event: ${{ github.event_name }}"
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai beautifulsoup4 lxml
      - name: Run daily AdSense SEO report
        run: python main.py
