name: daily-adsense-seo

on:
  workflow_dispatch:
    inputs:
      topics:
        description: "선택 주제. 쉼표 또는 줄바꿈으로 구분. 비우면 트렌드 키워드 자동 수집"
        required: false
        default: ""
      item_list_only:
        description: "글 초안 생성 없이 작성 후보 + 관련 기사 링크만 텔레그램 전송"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      news_links_per_topic:
        description: "주제별 관련 신문 기사 링크 수"
        required: false
        default: "5"
      telegram_only:
        description: "item_list_only=false일 때 WordPress 업로드 없이 텔레그램으로만 글 초안 전송"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      send_articles_to_telegram:
        description: "item_list_only=false일 때 생성된 글 본문을 텔레그램으로 별도 전송"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # 매일 08:30 KST = 23:30 UTC
    - cron: "30 23 * * *"

permissions:
  contents: read

jobs:
  daily-adsense-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SEO item report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_API_URL: ${{ secrets.WP_API_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_DEFAULT_STATUS: draft
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_DESCRIPTION: ${{ vars.SITE_DESCRIPTION }}
          GOOGLE_TRENDS_GEO: KR
          SELECTED_TOPICS: ${{ inputs.topics || '' }}
          ITEM_LIST_ONLY: ${{ inputs.item_list_only || 'true' }}
          NEWS_LINKS_PER_TOPIC: ${{ inputs.news_links_per_topic || '5' }}
          TELEGRAM_ONLY: ${{ inputs.telegram_only || 'false' }}
          SEND_ARTICLES_TO_TELEGRAM: ${{ inputs.send_articles_to_telegram || 'false' }}
          SEND_ARTICLE_ON_WP_FAIL: false
          # true로 바꾸면 iPhone, GPT 같은 영어 키워드도 허용합니다.
          ALLOW_ENGLISH_KEYWORDS: false
        run: python main.py --max-keywords 30 --max-posts 10

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adsense-seo-reports
          path: reports/*
          retention-days: 30
