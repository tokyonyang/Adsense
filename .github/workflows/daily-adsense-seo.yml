name: Daily AdSense SEO Hot Issue Report

on:
  workflow_dispatch:
  schedule:
    # KST 06:07 / 11:07 / 15:07 / 19:07
    - cron: "7 21 * * *"
    - cron: "7 2 * * *"
    - cron: "7 6 * * *"
    - cron: "7 10 * * *"

jobs:
  daily-adsense-seo:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # v1.26 카테고리 우선순위 옵션
      # finance_first: 경제/금융·증시·산업·정책 우선
      # balanced: 카테고리별 균형
      # all_score: 전체 점수순
      HOT_ISSUE_CATEGORY_MODE: "finance_first"

      # 경제/금융 중심 우선 카테고리
      HOT_ISSUE_PRIORITY_CATEGORIES: "경제·금융,증권·투자,산업·기업,정책·지원금,부동산·주거금융,생활·제도,국제"

      # TOP 10 중 우선 카테고리 최소/최대 개수
      HOT_ISSUE_PRIORITY_MIN: 6
      HOT_ISSUE_PRIORITY_MAX: 8

      # 보조 카테고리
      HOT_ISSUE_SECONDARY_CATEGORIES: "시사·정치,사회·사건,날씨·안전,건강·의료,교육·입시"
      HOT_ISSUE_SECONDARY_MAX: 3

      # 연예/스포츠/기타는 후순위 제한
      HOT_ISSUE_LOW_PRIORITY_CATEGORIES: "연예·문화,스포츠,기타"
      HOT_ISSUE_LOW_PRIORITY_MAX: 2
      HOT_ISSUE_OTHER_MAX: 1

      # 단일 카테고리 쏠림 제한
      HOT_ISSUE_PER_CATEGORY_MAX: 2
      HOT_ISSUE_PRIORITY_PER_CATEGORY_MAX: 3
      HOT_ISSUE_TOP_N: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai beautifulsoup4 lxml

      - name: Run daily AdSense SEO report
        run: |
          python main.py
