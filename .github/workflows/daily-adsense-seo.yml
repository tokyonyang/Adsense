name: Daily AdSense SEO Hot Issue Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "manual report type"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - overnight
          - morning
  schedule:
    # KST 05:30 → Overnight Hot Issue
    - cron: "30 20 * * *"

    # KST 06:07 / 11:07 / 15:07 / 19:07 → Daily HOT Issue
    - cron: "7 21 * * *"
    - cron: "7 2 * * *"
    - cron: "7 6 * * *"
    - cron: "7 10 * * *"

    # KST 06:10 → Morning Headline Cardnews
    - cron: "10 21 * * *"

jobs:
  scheduled-report-hub:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: "gemini-2.0-flash"

      HOT_ISSUE_EDITORIAL_MODE: "slot_editorial"
      HOT_ISSUE_SLOT_PLAN: "경제·금융:2,증권·투자:2,산업·기업:2,정책·생활:1,국제·안전:1,사회·시사:1,대중관심:1"
      HOT_ISSUE_NOISE_MAX: 1
      HOT_ISSUE_DEDUPE_THRESHOLD: "0.34"
      HOT_ISSUE_TOP_N: 10
      HOT_ISSUE_TREND_LIMIT: 35
      HOT_ISSUE_NEWS_PER_KEYWORD: 5
      HOT_ISSUE_LOOKBACK_HOURS: 48
      HOT_ISSUE_REQUEST_SLEEP: "0.12"

      HOT_ISSUE_USE_REFERENCE_HEADLINES: "true"
      HOT_ISSUE_REFERENCE_PACKS: "economic_newspaper,stock_finance,international,politics_social,it_science_life"
      HOT_ISSUE_REFERENCE_HEADLINES_FILE: "data/morning_reference_headlines.txt"

      HEADLINE_CARDNEWS_ISSUES: 5
      HEADLINE_CARDNEWS_MIN_EDITORIAL_SCORE: 40
      HEADLINE_AVOID_SLOTS: "대중관심"
      HEADLINE_PREFER_SLOTS: "경제·금융,증권·투자,산업·기업,정책·생활,국제·안전,사회·시사"
      HEADLINE_IMAGE_WIDTH: 1080
      HEADLINE_IMAGE_HEIGHT: 1080
      HEADLINE_IMAGE_SCALE: 2
      HEADLINE_SEND_LINK_DIGEST: "true"
      HEADLINE_ENABLE_MARKET_CHARTS: "true"
      HEADLINE_CHART_RANGE: "3mo"
      HEADLINE_CHART_INTERVAL: "1d"

      OVERNIGHT_LOOKBACK_HOURS: 16
      OVERNIGHT_NEWS_PER_QUERY: 8
      OVERNIGHT_TREND_LIMIT: 12
      OVERNIGHT_ENABLE_SNS_TRENDS: "true"
      OVERNIGHT_SNS_TREND_QUERIES: "YouTube:유튜브 인기 영상 한국|Instagram/Reels:인스타그램 릴스 트렌드 한국|TikTok:틱톡 트렌드 한국|X/Threads:X 트렌드 한국|X/Threads:스레드 Threads 인기 주제 한국"
      OVERNIGHT_ENABLE_WEATHER: "true"
      OVERNIGHT_WEATHER_TIMEOUT: 20
      OVERNIGHT_WEATHER_REGIONS: "서울,인천,대전,대구,부산,광주,제주"
      OVERNIGHT_IMAGE_WIDTH: 1080
      OVERNIGHT_IMAGE_HEIGHT: 1080
      OVERNIGHT_IMAGE_SCALE: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Triggered by event: ${{ github.event_name }}"
          echo "Triggered by schedule: ${{ github.event.schedule }}"
          echo "Manual report type: ${{ github.event.inputs.report_type }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Decide report type
        id: decide
        shell: bash
        run: |
          REPORT_TYPE="${{ github.event.inputs.report_type }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "30 20 * * *")
                REPORT_TYPE="overnight"
                ;;
              "10 21 * * *")
                REPORT_TYPE="morning"
                ;;
              *)
                REPORT_TYPE="daily"
                ;;
            esac
          fi

          if [ -z "$REPORT_TYPE" ]; then
            REPORT_TYPE="daily"
          fi

          echo "report_type=$REPORT_TYPE" >> "$GITHUB_OUTPUT"
          echo "Selected report type: $REPORT_TYPE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        if: steps.decide.outputs.report_type == 'overnight' || steps.decide.outputs.report_type == 'morning'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai beautifulsoup4 lxml
          if [ "${{ steps.decide.outputs.report_type }}" = "overnight" ] || [ "${{ steps.decide.outputs.report_type }}" = "morning" ]; then
            pip install playwright
            python -m playwright install --with-deps chromium
          fi

      - name: Run overnight hot issue report
        if: steps.decide.outputs.report_type == 'overnight'
        run: |
          python -m app.jobs.send_overnight_hotissue_report

      - name: Run daily AdSense SEO report
        if: steps.decide.outputs.report_type == 'daily'
        run: |
          python main.py

      - name: Run morning headline cardnews report
        if: steps.decide.outputs.report_type == 'morning'
        run: |
          python -m app.jobs.send_headline_cardnews_report
