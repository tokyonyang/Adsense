name: Overnight Hot Issue Report

on:
  workflow_dispatch:

jobs:
  overnight-hotissue-report:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: "gemini-2.0-flash"

      OVERNIGHT_LOOKBACK_HOURS: 16
      OVERNIGHT_NEWS_PER_QUERY: 8
      OVERNIGHT_TREND_LIMIT: 12
      OVERNIGHT_ENABLE_SNS_TRENDS: "true"
      OVERNIGHT_SNS_TREND_QUERIES: "YouTube:유튜브 인기 영상 한국|Instagram/Reels:인스타그램 릴스 트렌드 한국|TikTok:틱톡 트렌드 한국|X/Threads:X 트렌드 한국|X/Threads:스레드 Threads 인기 주제 한국"
      OVERNIGHT_ENABLE_WEATHER: "true"
      OVERNIGHT_WEATHER_TIMEOUT: 20
      OVERNIGHT_WEATHER_REGIONS: "서울,인천,대전,대구,부산,광주,제주"
      OVERNIGHT_IMAGE_WIDTH: 1080
      OVERNIGHT_IMAGE_HEIGHT: 1080
      OVERNIGHT_IMAGE_SCALE: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger schedule
        run: |
          echo "Manual run only"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Asia/Seoul date '+KST now: %Y-%m-%d %H:%M:%S'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser python-dotenv google-generativeai playwright beautifulsoup4 lxml
          python -m playwright install --with-deps chromium

      - name: Send overnight hot issue report
        run: |
          python -m app.jobs.send_overnight_hotissue_report
